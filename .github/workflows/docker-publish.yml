name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker-compose.yml
          target: backend          # This matches how your compose is structured
          push: true
          tags: ghcr.io/tm-const/shadowbroker-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker-compose.yml
          target: frontend
          push: true
          tags: ghcr.io/tm-const/shadowbroker-frontend:latest
